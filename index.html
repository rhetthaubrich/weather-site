<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Weather Finder</title>
  </head>
  <body>
    <h1>Weather Finder</h1>

    <label>
      Location:
      <input id="location" placeholder="Enter city (e.g. London)" />
    </label>
    <br /><br />

    <label>
      Date:
      <input id="date" type="date" />
    </label>
    <br /><br />

    <button onclick="getWeather()">Get Weather</button>

    <h2>Result</h2>
    <pre id="output">Enter a location and date, then click "Get Weather".</pre>

    <script src="script.js"></script>
  </body>
</html>
